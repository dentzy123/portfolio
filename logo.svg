<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160" fill="none" role="img" aria-label="Denmar Curtivo — dev.folio logo">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="logo-bg" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1e1b3a"/>
      <stop offset="100%" stop-color="#0f0f1e"/>
    </linearGradient>
    <!-- Brand accent gradient: purple → pink -->
    <linearGradient id="logo-accent" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7c6cfc"/>
      <stop offset="100%" stop-color="#fc6c9e"/>
    </linearGradient>
    <!-- Text gradient: light → purple tint -->
    <linearGradient id="logo-text" x1="0" y1="35" x2="0" y2="105" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#f0eeff"/>
      <stop offset="100%" stop-color="#a594ff"/>
    </linearGradient>
    <!-- Outer ambient glow -->
    <filter id="logo-outer-glow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="over"/>
    </filter>
    <!-- Text inner glow -->
    <filter id="logo-text-glow" x="-15%" y="-15%" width="130%" height="130%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Dot glow -->
    <filter id="logo-dot-glow" x="-80%" y="-80%" width="260%" height="260%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Ambient glow halo (behind everything) ── -->
  <rect x="4" y="4" width="152" height="152" rx="33" fill="none"
        stroke="url(#logo-accent)" stroke-width="2" opacity="0.3"
        filter="url(#logo-outer-glow)"/>

  <!-- ── Badge background ── -->
  <rect x="2" y="2" width="156" height="156" rx="34" fill="url(#logo-bg)"/>

  <!-- ── Subtle inner radial bloom ── -->
  <radialGradient id="logo-bloom" cx="50%" cy="44%" r="50%" gradientUnits="objectBoundingBox">
    <stop offset="0%"   stop-color="#7c6cfc" stop-opacity="0.14"/>
    <stop offset="100%" stop-color="#7c6cfc" stop-opacity="0"/>
  </radialGradient>
  <rect x="2" y="2" width="156" height="156" rx="34" fill="url(#logo-bloom)"/>

  <!-- ── Gradient border ── -->
  <rect x="2" y="2" width="156" height="156" rx="34" fill="none"
        stroke="url(#logo-accent)" stroke-width="1.5"/>

  <!-- ── Corner accent — top highlight bar ── -->
  <rect x="28" y="2" width="104" height="1.5" rx="1"
        fill="url(#logo-accent)" opacity="0.55"/>

  <!-- ── DC Monogram ── -->
  <text
    x="80" y="97"
    font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="70"
    font-weight="800"
    fill="url(#logo-text)"
    text-anchor="middle"
    letter-spacing="-2"
    filter="url(#logo-text-glow)">DC</text>

  <!-- ── Accent dot (nod to "dev.folio") ── -->
  <circle cx="80" cy="122" r="4.5"
          fill="url(#logo-accent)"
          filter="url(#logo-dot-glow)"/>
</svg>
